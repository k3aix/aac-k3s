name: Docker Multi-arch Build

on:
  workflow_call:
    inputs:
      service:
        description: Image name in the registry (e.g. jazz-frontend)
        required: true
        type: string
      context:
        description: Docker build context path relative to the calling repo root
        required: true
        type: string
      registry:
        required: false
        type: string
        default: registry.kube-registry.svc.cluster.local:5000
      push:
        description: Whether to push images (set false on pull_request)
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build
    runs-on: k3aix-amd64-runners
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."${{ inputs.registry }}"]
              http = true
              insecure = true

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          tags: |
            ${{ inputs.registry }}/${{ inputs.service }}:${{ steps.meta.outputs.sha }}
            ${{ inputs.registry }}/${{ inputs.service }}:latest
