apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env
  namespace: jazzam-staging
data:
  VITE_SEARCH_SERVICE_URL: "http://search-service:5001"
  VITE_STANDARDS_SERVICE_URL: "http://standards-service:3001"
---
apiVersion: v1
kind: Service
metadata:
  name: jazz-frontend
  namespace: jazzam-staging
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: jazz-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jazz-frontend
  namespace: jazzam-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jazz-frontend
  template:
    metadata:
      labels:
        app: jazz-frontend
    spec:
      containers:
      - name: jazz-frontend
        image: localhost:30100/jazz-frontend:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: frontend-env
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: standards-env
  namespace: jazzam-staging
data:
  PORT: "3001"
  NODE_ENV: "production"
  DB_HOST: "postgres-postgresql-primary.postgres.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "jazz-postgres"
  DB_USER: "postgres"
  CORS_ORIGIN: "*"
---
apiVersion: v1
kind: Service
metadata:
  name: standards-service
  namespace: jazzam-staging
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: jazz-standards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jazz-standards
  namespace: jazzam-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jazz-standards
  template:
    metadata:
      labels:
        app: jazz-standards
    spec:
      containers:
      - name: jazz-standards
        image: localhost:30100/jazz-standards:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: standards-env
        - secretRef:
            name: jazz-standards.env
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-env
  namespace: jazzam-staging
data:
  ASPNETCORE_URLS: "http://+:5001"
  ASPNETCORE_ENVIRONMENT: "Production"
  StandardsService__BaseUrl: "http://standards-service:3001"
  TZ: "Europe/Rome"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: jazzam-staging
spec:
  ports:
  - port: 5001
    targetPort: 5001
  selector:
    app: jazz-search
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jazz-search
  namespace: jazzam-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jazz-search
  template:
    metadata:
      labels:
        app: jazz-search
    spec:
      containers:
      - name: jazz-search
        image: localhost:30100/jazz-search:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: search-env
        resources:
          requests:
            memory: "3Gi"
          limits:
            memory: "5Gi"
