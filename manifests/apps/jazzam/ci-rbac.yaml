apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: jazzam
---
apiVersion: v1
kind: Secret
metadata:
  name: ci-deployer-token
  namespace: jazzam
  annotations:
    kubernetes.io/service-account.name: ci-deployer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deployer
  namespace: jazzam
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer
  namespace: jazzam
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ci-deployer
subjects:
- kind: ServiceAccount
  name: ci-deployer
  namespace: jazzam
