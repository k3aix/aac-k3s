apiVersion: v1
kind: Service
metadata:
  labels:
    app: jazz-frontend
  name: jazz-frontend
  namespace: jazzam
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: jazz-frontend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env
  namespace: jazzam
data:
  VITE_SEARCH_SERVICE_URL: "http://search-service:5001"
  VITE_STANDARDS_SERVICE_URL: "http://standards-service:3001"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jazz-frontend
  name: jazz-frontend
  namespace: jazzam
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jazz-frontend
  template:
    metadata:
      labels:
        app: jazz-frontend
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - jazz-frontend
            topologyKey: topology.kubernetes.io/zone
      containers:
      - image: localhost:30100/jazz-frontend:v1.0.0
        imagePullPolicy: Always
        name: jazz-frontend
        envFrom:
        - configMapRef:
            name: frontend-env
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: jazz-standards
  name: standards-service
  namespace: jazzam
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: jazz-standards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: standards-env
  namespace: jazzam
data:
  PORT: "3001"
  NODE_ENV: "production"
  DB_HOST: "postgres-postgresql-primary.postgres.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "jazz-postgres"
  DB_USER: "postgres"
  CORS_ORIGIN: "*"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jazz-standards
  name: jazz-standards
  namespace: jazzam
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jazz-standards
  template:
    metadata:
      labels:
        app: jazz-standards
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - jazz-standards
            topologyKey: topology.kubernetes.io/zone
      containers:
      - image: localhost:30100/jazz-standards:v1.0.0
        imagePullPolicy: Always
        name: jazz-standards
        envFrom:
        - configMapRef:
            name: standards-env
        - secretRef:
            name: jazz-standards.env
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: jazz-search
  name: search-service
  namespace: jazzam
spec:
  ports:
  - port: 5001
    targetPort: 5001
  selector:
    app: jazz-search
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-env
  namespace: jazzam
data:
  ASPNETCORE_URLS: "http://+:5001"
  ASPNETCORE_ENVIRONMENT: "Production"
  StandardsService__BaseUrl: "http://standards-service:3001"
  TZ: "Europe/Rome"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jazz-search
  name: jazz-search
  namespace: jazzam
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jazz-search
  template:
    metadata:
      labels:
        app: jazz-search
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - jazz-search
            topologyKey: topology.kubernetes.io/zone
      containers:
      - image: localhost:30100/jazz-search:v1.0.0
        imagePullPolicy: Always
        name: jazz-search
        envFrom:
        - configMapRef:
            name: search-env
        resources:
          requests:
            memory: "3Gi"
          limits:
            memory: "5Gi"
