# ARC Runner Scale Set — arm64 runners for k3aix
# Scheduled exclusively on arm64 nodes (rospicant, dietpi)
# DinD configured manually to set timeoutSeconds: 10 on the dind startup probe
# (default 1s is too short for Raspberry Pi hardware)

githubConfigUrl: "https://github.com/k3aix"
githubConfigSecret: "github-app-secret"

minRunners: 0
maxRunners: 0

template:
  spec:
    nodeSelector:
      kubernetes.io/arch: arm64

    volumes:
    - name: work
      emptyDir: {}
    - name: dind-sock
      emptyDir: {}
    - name: dind-externals
      emptyDir: {}

    initContainers:
    - name: init-dind-externals
      image: ghcr.io/actions/actions-runner:latest
      command: ["cp"]
      args: ["-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
      volumeMounts:
      - name: dind-externals
        mountPath: /home/runner/tmpDir

    - name: dind
      image: docker:dind
      restartPolicy: Always
      securityContext:
        privileged: true
      args:
      - dockerd
      - --host=unix:///var/run/docker.sock
      - --group=$(DOCKER_GROUP_GID)
      - --storage-driver=vfs
      env:
      - name: DOCKER_GROUP_GID
        value: "123"
      startupProbe:
        exec:
          command: [docker, info]
        failureThreshold: 30
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 10
      volumeMounts:
      - name: work
        mountPath: /home/runner/_work
      - name: dind-sock
        mountPath: /var/run
      - name: dind-externals
        mountPath: /home/runner/externals

    containers:
    - name: runner
      image: ghcr.io/actions/actions-runner:latest
      command: ["/home/runner/run.sh"]
      env:
      - name: DOCKER_HOST
        value: unix:///var/run/docker.sock
      - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
        value: "120"
      volumeMounts:
      - name: work
        mountPath: /home/runner/_work
      - name: dind-sock
        mountPath: /var/run
